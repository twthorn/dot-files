# Key bindings
# Set prefix to Ctrl-Space
unbind C-b
set -g prefix C-Space
bind Space send-prefix

# navigate with vim keys
set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind = next-layout

# Session chooser sorted alphabetically by name
bind s choose-tree -sZ -O name

# Mouse support
set -g mouse on

# Terminal title bar
set -g set-titles-string "#I:#P - #W - #T"

# increase display time out time
set -g display-panes-time 2000

# start numbering from 0 instead of 1
set -g base-index 1
setw -g pane-base-index 1
set -g default-terminal "xterm-256color"

# Bypass readonly TMOUT set in /etc/profile.d/Z99-tmout.sh
# Launches bash skipping system profiles, unsets TMOUT, then execs normal bash
set -g default-command "bash --norc --noprofile -c 'unset TMOUT; exec bash --rcfile ~/.bashrc'"
set-option -g history-limit 10000

# Tmux Plugin Manager (TPM)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'

# Save/restore tmux sessions across restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# Continuum settings - auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Auto-install missing TPM plugins on tmux start
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (keep this line at the very bottom of .tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
